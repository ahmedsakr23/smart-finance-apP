  <style>
    :root {

      --shadow:0 10px 30px rgba(16,24,40,.08); --radius:18px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--ink); background:linear-gradient(180deg,#edf4ff 0,#f4f7fb 180px,#f4f7fb 100%);
    }
    .app { max-width:1200px; margin:0 auto; padding:14px 14px 80px; }
    .hero {
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff; border-radius:26px; padding:18px; box-shadow:var(--shadow);
    }
    .hero h1 { margin:0 0 8px; font-size:1.35rem; }
    .hero p { margin:0; line-height:1.7; opacity:.96; }
    .top-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .tabs { display:flex; gap:8px; overflow:auto; padding:8px 2px 2px; margin:14px 0; }
    .tab {
      border:none; background:#fff; color:var(--ink); padding:10px 14px; border-radius:999px;
      box-shadow:var(--shadow); font-weight:800; white-space:nowrap; cursor:pointer;
    }
    .tab.active { background:var(--ink); color:#fff; }
    .view { display:none; }
    .view.active { display:block; }
    .grid { display:grid; gap:12px; }
    .cards { grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); }
    .two { grid-template-columns:1.1fr .9fr; }
    .three { grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); }
    .card {
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:14px;
    }
    .section-title { margin:0 0 10px; font-size:1.04rem; font-weight:900; }
    .metric .label { color:var(--muted); font-size:.88rem; margin-bottom:6px; }
    .metric .value { font-size:1.3rem; font-weight:900; letter-spacing:-.02em; }
    .metric.good .value { color:var(--good); }
    .metric.bad .value { color:var(--bad); }
    .hint, .muted { color:var(--muted); font-size:.86rem; }
    .toolbar, .form-grid, .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .toolbar, .form-grid { margin-bottom:10px; }
    input, select, textarea, button {
      font:inherit;
    }
    .toolbar input, .toolbar select, .form-grid input, .form-grid select, .form-grid textarea {
      flex:1 1 140px; min-width:120px; width:100%;
      border:1px solid var(--line); border-radius:12px; background:#fff; padding:10px 12px;
    }
    textarea { min-height:90px; resize:vertical; }
    button, .btn {
      border:none; border-radius:12px; padding:10px 12px; cursor:pointer; font-weight:800;
      background:var(--brand); color:#fff; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
    }
    button.secondary, .btn.secondary { background:#eff6ff; color:var(--brand); border:1px solid #c7ddff; }
    button.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); }
    button.danger { background:#fff1f2; color:var(--bad); border:1px solid #fecdd3; }
    .pill {
      display:inline-flex; align-items:center; gap:6px; background:#eef4ff; color:var(--brand);
      padding:4px 10px; border-radius:999px; font-size:.8rem; font-weight:800;
    }
    .pill.good { background:#ecfdf3; color:var(--good); }
    .pill.warn { background:#fff7e8; color:var(--warn); }
    .pill.dark { background:#e2e8f0; color:#334155; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid #edf2f7; text-align:right; vertical-align:top; font-size:.92rem; }
    th { position:sticky; top:0; background:#fff; color:var(--muted); font-weight:900; }
    .table-wrap { overflow:auto; max-height:70vh; border:1px solid var(--line); border-radius:16px; background:#fff; }
    .notice {
      background:#fff8e7; border:1px solid #f7d38b; color:#8a5a00;
      border-radius:14px; padding:10px 12px; line-height:1.7; margin-bottom:12px;
    }
    .success {
      display:none; background:#ecfdf3; color:#166534; border:1px solid #bbf7d0;
      padding:10px 12px; border-radius:14px; margin-top:10px;
    }
    .empty { text-align:center; color:var(--muted); padding:18px; }
    .login-screen {
      max-width:480px; margin:40px auto; background:#fff; padding:18px; border-radius:24px;
      border:1px solid var(--line); box-shadow:var(--shadow);
    }
    .login-screen h2 { margin-top:0; }
    .small { font-size:.84rem; }
    .footer { text-align:center; color:var(--muted); font-size:.82rem; margin-top:16px; }
    .svg-chart {
      width:100%; background:#fff; border:1px solid var(--line); border-radius:16px; padding:10px;
    }
    .split { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .install-note { margin-top:8px; }
    @media (max-width:760px) {
      .two { grid-template-columns:1fr; }
      th, td { font-size:.84rem; padding:9px 7px; }
    }
  </style>
</head>

function esc(v) {
  return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}

  return Number(v || 0).toLocaleString('ar-EG', {maximumFractionDigits:2});
}

function monthKey(v) { return String(v || '').slice(0,7); }
function uid() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}
function showMessage(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(showMessage._t);
  showMessage._t = setTimeout(() => el.style.display = 'none', 2400);
}
function downloadBlob(filename, content, type) {
  const blob = new Blob([content], {type});

  a.click();
  URL.revokeObjectURL(a.href);
}

    (accounts || []).forEach(a => rel.get(project).accounts.add(a));
  });
  Object.entries(meta.projectWorks).forEach(([project, works]) => {
    if (!rel.has(project)) rel.set(project, {accounts:new Set(), works:new Set()});
    (works || []).forEach(w => rel.get(project).works.add(w));
  });
  allEntries().forEach(r => {
    const p = r.project || 'بدون مشروع';
    if (!rel.has(p)) rel.set(p, {accounts:new Set(), works:new Set()});
    if (r.account) rel.get(p).accounts.add(r.account);
    if (r.work) rel.get(p).works.add(r.work);
  });
  return {
    projects:[...projects].filter(Boolean).sort(),
    rel
  };
}

function state() {
  const entries = allEntries();
  const byType = {دفعات:0, مصروفات:0, إيرادات:0};
  entries.forEach(r => byType[r.type] = (byType[r.type] || 0) + Number(r.amount || 0));
  const revenue = Number(baseData.overview?.revenue || 0) + byType['إيرادات'];
  const spent = byType['دفعات'] + byType['مصروفات'];

  const projectMap = new Map();
  (baseData.projects || []).forEach(p => projectMap.set(p.project, {
    project:p.project, operations:Number(p.operations || 0), misc:Number(p.misc || 0),
    revenue:Number(p.revenue || 0), total:Number(p.total || 0), net:Number(p.net || 0)
  }));
  localEntries().forEach(r => {
    const key = r.project || 'بدون مشروع';
    if (!projectMap.has(key)) projectMap.set(key, {project:key, operations:0, misc:0, revenue:0, total:0, net:0});
    const p = projectMap.get(key);
    const amt = Number(r.amount || 0);
    if (r.type === 'إيرادات') p.revenue += amt;
    else if (r.type === 'دفعات') p.operations += amt;
    else p.misc += amt;
    p.total = p.operations + p.misc;
    p.net = p.revenue - p.total;
  });

  const aggregate = (field) => {
    const map = new Map();
    entries.forEach(r => {
      const k = r[field] || 'غير محدد';
      map.set(k, (map.get(k) || 0) + Number(r.amount || 0));
    });
    return [...map.entries()].map(([name, amount]) => ({name, amount})).sort((a,b)=>b.amount-a.amount);
  };

  const months = new Map();
  entries.forEach(r => {
    const m = monthKey(r.date) || 'بدون تاريخ';
    if (!months.has(m)) months.set(m, {month:m, payments:0, expenses:0, revenue:0, count:0});
    const row = months.get(m);
    if (r.type === 'دفعات') row.payments += Number(r.amount || 0);
    else if (r.type === 'مصروفات') row.expenses += Number(r.amount || 0);
    else if (r.type === 'إيرادات') row.revenue += Number(r.amount || 0);
    row.count += 1;
  });
  const monthly = [...months.values()].sort((a,b)=>String(b.month).localeCompare(String(a.month))).map(r => ({...r, spent:r.payments+r.expenses, net:r.revenue-(r.payments+r.expenses)}));

  return {
    entries,
    revenue,
    spent,
    net: revenue - spent,
    byType,
    projects:[...projectMap.values()].sort((a,b)=>b.total-a.total),
    topWorks: aggregate('work').slice(0,8),
    topAccounts: aggregate('account').slice(0,8),
    monthly
  };
}

function monthlyLineSvg(rows) {
  if (!rows.length) return '<div class="empty">لا توجد بيانات كافية للرسم.</div>';
  const width = 680, height = 240, pad = 34;
  const vals = rows.map(r => Number(r.net || 0));
  const min = Math.min(...vals, 0), max = Math.max(...vals, 1);
  const span = max - min || 1;
  const x = i => pad + (i * (width - pad * 2) / Math.max(rows.length - 1, 1));
  const y = v => height - pad - ((v - min) * (height - pad * 2) / span);
  const pts = rows.map((r, i) => `${x(i)},${y(r.net)}`).join(' ');
  const labels = rows.map((r, i) => `<text x="${x(i)}" y="${height-10}" text-anchor="middle" font-size="10" fill="#64748b">${esc(r.month)}</text>`).join('');
  const dots = rows.map((r, i) => `<circle cx="${x(i)}" cy="${y(r.net)}" r="4" fill="#155eef"></circle>`).join('');
  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" height="220" aria-label="صافي شهري">
      <line x1="${pad}" y1="${y(0)}" x2="${width-pad}" y2="${y(0)}" stroke="#e2e8f0" stroke-dasharray="4 4"></line>
      <polyline fill="none" stroke="#155eef" stroke-width="3" points="${pts}"></polyline>
      ${dots}
      ${labels}
      <text x="${pad}" y="18" fill="#64748b" font-size="12">صافي شهري</text>
    </svg>
  `;
}

                  <td>${currency(r.spent)}</td>
                  <td style="color:${r.net>=0?'var(--good)':'var(--bad)'};font-weight:900">${currency(r.net)}</td>
                  <td>${r.count}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="section-title">توزيع أنواع الحركات</div>
        <div class="svg-chart">${donutSvg(s.byType)}</div>
      </div>
    </div>
  `;
}

function donutSvg(obj) {
  const values = [obj['دفعات']||0, obj['مصروفات']||0, obj['إيرادات']||0];
  const labels = ['دفعات','مصروفات','إيرادات'];
  const colors = ['#155eef','#f59e0b','#16a34a'];
  const total = values.reduce((a,b)=>a+b,0) || 1;
  let start = 0;
  const cx = 120, cy = 120, r = 70;
  const arcs = values.map((v, i) => {
    const angle = (v / total) * Math.PI * 2;
    const end = start + angle;
    const x1 = cx + r * Math.cos(start - Math.PI/2), y1 = cy + r * Math.sin(start - Math.PI/2);
    const x2 = cx + r * Math.cos(end - Math.PI/2), y2 = cy + r * Math.sin(end - Math.PI/2);
    const large = angle > Math.PI ? 1 : 0;
    const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    start = end;
    return `<path d="${d}" fill="${colors[i]}"></path>`;
  }).join('');
  const legend = labels.map((l,i)=>`<div class="split small"><span>${l}</span><span>${currency(values[i])}</span></div>`).join('');
  return `
    <div class="split">
      <svg viewBox="0 0 240 240" width="220" height="220">
        ${arcs}
        <circle cx="120" cy="120" r="36" fill="#fff"></circle>
      </svg>
      <div style="min-width:160px;">${legend}</div>
    </div>`;
}

function renderSettings() {
  const session = loadSession();
  if (!session?.canSettings) {
    document.getElementById('settings').innerHTML = '<div class="card"><div class="empty">غير متاح.</div></div>';
    return;
  }
  const sync = loadSyncSettings();
  const users = loadUsers();
  document.getElementById('settings').innerHTML = `
    <div class="grid two">
      <div class="card">
        <div class="section-title">مزامنة الإنترنت</div>
        <div class="notice small">هذه النسخة فيها مزامنة جاهزة، لكن تحتاج أن تضع رابط API أو Google Apps Script Web App خاص بك. عند الضغط على مزامنة الآن سيتم إرسال البيانات بصيغة JSON.</div>
        <div class="form-grid">
          <input id="syncEndpoint" value="${esc(sync.endpoint)}" placeholder="رابط المزامنة">
          <input id="syncToken" value="${esc(sync.token)}" placeholder="Token اختياري">
        </div>
        <div class="actions">
          <button id="saveSyncSettingsBtn">حفظ إعدادات المزامنة</button>
          <button class="secondary" id="exportBackupBtn">نسخة احتياطية JSON</button>
          <label class="btn secondary">استيراد نسخة<input type="file" id="importBackupInput" accept=".json" hidden></label>
        </div>
        <div class="success" id="settingsMsg"></div>
      </div>

      <div class="card">
        <div class="section-title">المستخدمون والصلاحيات</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>اسم المستخدم</th><th>الدور</th><th>PIN</th><th>الصلاحيات</th></tr></thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td>${esc(u.username)}</td>
                  <td>${esc(u.role)}</td>
                  <td>${esc(u.pin)}</td>
                  <td>${u.canSettings ? 'كاملة' : 'تشغيل فقط'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  document.getElementById('saveSyncSettingsBtn').onclick = () => {
    saveSyncSettings({
      endpoint: document.getElementById('syncEndpoint').value.trim(),
      token: document.getElementById('syncToken').value.trim()
    });
    showMessage('settingsMsg', 'تم حفظ إعدادات المزامنة.');
  };
  document.getElementById('exportBackupBtn').onclick = () => {
    const payload = {
      entries: loadEntries(),
      meta: loadMeta(),
      users: loadUsers(),
      sync: loadSyncSettings()
    };
    downloadBlob('smart-finance-backup.json', JSON.stringify(payload, null, 2), 'application/json;charset=utf-8;');
  };
  document.getElementById('importBackupInput').onchange = ev => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (Array.isArray(data.entries)) saveEntries(data.entries);
        if (data.meta) saveMeta(data.meta);
        if (Array.isArray(data.users)) saveUsers(data.users);
        if (data.sync) saveSyncSettings(data.sync);
        renderApp();
      } catch (e) {
        alert('ملف النسخة الاحتياطية غير صالح.');
      }
    };
    reader.readAsText(file, 'utf-8');
  };
}

async function syncNow() {
  const sync = loadSyncSettings();
  if (!sync.endpoint) {
    alert('أدخل رابط المزامنة أولًا من الإعدادات.');
    return;
  }
  const payload = {
    app:'smart-finance',
    sent_at:new Date().toISOString(),
    entries:loadEntries(),
    meta:loadMeta()
  };
  try {
    const res = await fetch(sync.endpoint, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        ...(sync.token ? {'Authorization':'Bearer ' + sync.token} : {})
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    alert('تمت المزامنة بنجاح.');
  } catch (e) {
    alert('فشلت المزامنة. تأكد من رابط API.\n' + e.message);
  }
}

function simpleTable(rows) {
  if (!rows.length) return '<div class="empty">لا توجد بيانات.</div>';
  const cols = Object.keys(rows[0]);
  return `
    <table>
      <thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  `;
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

const session = loadSession();
if (session) renderApp(); else renderLogin();
